<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Art_By_Tofa - Graphic Design: Thumbnails, logos, banners and typographic work." />
  <title>Art_By_Tofa - Graphic Design</title>
  <link rel="stylesheet" href="assets/css/portfolio.css" />
</head>
<body>

  <div id="nav-placeholder"></div>

  <section class="page-hero">
    <span class="page-hero-eyebrow">Category 04</span>
    <h1 class="page-hero-title">Graphic Design</h1>
    <p class="page-hero-desc">
      Thumbnails, logos, banners, and typographic work. Clean, impactful designs
      built around strong visuals and clear communication.
    </p>
  </section>

  <div class="gallery-wrap">
    <div class="container">
      <div class="gallery-grid two-col">

        <div class="g-item wide reveal" data-src="images/ACShadows(TEST).jpg">
          <img src="images/ACShadows(TEST).jpg" alt="Assassin's Creed Shadows - Thumbnail design" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item wide reveal d1" data-src="images/ACBrotherhood_Thumbnail_Part1.jpg">
          <img src="images/ACBrotherhood_Thumbnail_Part1.jpg" alt="Assassin's Creed Brotherhood - Thumbnail" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item wide reveal d2" data-src="images/AC4_Thumbnail_Part1.jpg">
          <img src="images/AC4_Thumbnail_Part1.jpg" alt="Assassin's Creed 4 - Thumbnail" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item wide reveal" data-src="images/Ac1_Thumbnail_Part1.jpg">
          <img src="images/Ac1_Thumbnail_Part1.jpg" alt="Assassin's Creed 1 - Thumbnail" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item wide reveal d1" data-src="images/CommingSoonBanner.jpg">
          <img src="images/CommingSoonBanner.jpg" alt="Coming Soon Banner design" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item wide reveal d2" data-src="images/KaylasFudgeArt.jpg">
          <img src="images/KaylasFudgeArt.jpg" alt="Kayla's Fudge - Artwork and design" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item std reveal" data-src="images/OlusoLogo.jpg">
          <img src="images/OlusoLogo.jpg" alt="Oluso - Logo design" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item std reveal d1" data-src="images/BeCool Text.jpg">
          <img src="images/BeCool Text.jpg" alt="Be Cool - Typographic design" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item std reveal d2" data-src="images/Pow-text.jpg">
          <img src="images/Pow-text.jpg" alt="POW - Typographic text effect" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item wide reveal" data-src="images/RAJGradPic.jpg">
          <img src="images/RAJGradPic.jpg" alt="RAJ Graduation - Photo edit" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script defer src="assets/js/portfolio.js"></script>
