<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Art_By_Tofa  Concept Art: Character designs, turnarounds, and visual development." />
  <title>Art_By_Tofa  Concept Art</title>
  <link rel="stylesheet" href="assets/css/portfolio.css" />
</head>
<body>

  <div id="nav-placeholder"></div>

  <section class="page-hero">
    <span class="page-hero-eyebrow">Category 01</span>
    <h1 class="page-hero-title">Concept Art</h1>
    <p class="page-hero-desc">
      Character sheets, turnarounds, and design explorations. From rough idea to finished sheet 
      every line serves the character's story.
    </p>
  </section>

  <div class="gallery-wrap">
    <div class="container">
      <div class="gallery-grid two-col">

        <div class="g-item portrait reveal"
             data-src="images/MideCharacterSheet(Face).jpg">
          <img src="images/MideCharacterSheet(Face).jpg"
               alt="Mide  Character sheet (face study)" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item portrait reveal d1"
             data-src="images/SkaraSheet.jpg">
          <img src="images/SkaraSheet.jpg"
               alt="Skara  Character sheet" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item portrait reveal d2"
             data-src="images/DemiDesign.jpg">
          <img src="images/DemiDesign.jpg"
               alt="Demi  Character design sheet" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item portrait reveal d3"
             data-src="images/ItoDesign.jpg">
          <img src="images/ItoDesign.jpg"
               alt="Ito  Character design sheet" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

        <div class="g-item portrait reveal g-span2"
             data-src="images/Demi-Turnaround.jpg">
          <img src="images/Demi-Turnaround.jpg"
               alt="Demi  Character turnaround" loading="lazy" />
          <div class="g-overlay"><div class="g-zoom"><i class="fas fa-expand"></i></div></div>
        </div>

      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
  <script defer src="assets/js/portfolio.js"></script>
</body>
</html>
